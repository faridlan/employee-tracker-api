version: '3.8'

services:
  employee-tracker-api:
    build: .
    container_name: employee-tracker-api-container
    restart: unless-stopped # <--- Sangat penting agar auto-restart jika server reboot / crash
    ports:
      # Membaca APP_PORT dari .env, jika tidak ada default ke 8080
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    # Opsional: Jika butuh mapping timezone di level compose
    environment:
      - TZ=Asia/Jakarta
    networks:
      - database_luar

networks:
  database_luar:
    external: true
    name: psqldb_network
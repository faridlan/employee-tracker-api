    - target_id
    type: object
  github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.TargetDetailResponse:
    properties:
      created_at:
        type: string
      employee_id:
        description: Tambahkan omitempty agar hilang jika tidak diperlukan

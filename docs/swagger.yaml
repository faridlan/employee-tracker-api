host: localhost:8080
info:
  contact: {}
  description: Ini adalah dokumentasi API untuk sistem pencatatan target dan performa
    Karyawan (Employee Tracker).
  title: Employee Tracker API
  version: "1.0"
paths:
  /api/achievements:
    post:
      consumes:
      - application/json
      description: Mencatat riwayat transaksi/pencairan (ledger) baru untuk sebuah
        target
      parameters:
      - description: Payload data pencapaian
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.RecordAchievementRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Pencapaian berhasil dicatat
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.SuccessResponse-github_com_faridlan_employee-tracker-api_internal_delivery_http_dto_AchievementResponse'
        "400":
          description: Format JSON salah atau validasi gagal
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
        "404":
          description: Target tidak ditemukan
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
      summary: Catat Pencapaian Target
      tags:
      - Achievement
  /api/categories:
    get:
      description: Mengambil daftar semua kategori produk yang tersedia
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil mengambil daftar kategori
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.SuccessResponse-array_github_com_faridlan_employee-tracker-api_internal_delivery_http_dto_CategoryResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
      summary: List Semua Kategori
      tags:
      - Category
    post:
      consumes:
      - application/json
      description: Menambahkan data kategori produk master ke sistem
      parameters:
      - description: Payload data kategori
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.CategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Kategori berhasil dibuat
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.SuccessResponse-github_com_faridlan_employee-tracker-api_internal_delivery_http_dto_CategoryResponse'
        "400":
          description: Format JSON salah atau validasi gagal
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
      summary: Buat Kategori Baru
      tags:
      - Category
  /api/categories/{category_id}/products:
    get:
      description: Mengambil daftar produk berdasarkan ID Kategorinya
      parameters:
      - description: ID Kategori
        in: path
        name: category_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil mengambil produk
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.SuccessResponse-array_github_com_faridlan_employee-tracker-api_internal_delivery_http_dto_ProductWithCategoryResponse'
        "400":
          description: Format UUID salah
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
      summary: List Produk Berdasarkan Kategori
      tags:
      - Product
  /api/categories/{id}:
    get:
      description: Menampilkan detail informasi kategori berdasarkan ID
      parameters:
      - description: ID Kategori
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil mengambil detail kategori
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.SuccessResponse-github_com_faridlan_employee-tracker-api_internal_delivery_http_dto_CategoryResponse'
        "400":
          description: Format UUID salah
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
        "404":
          description: Kategori tidak ditemukan
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
      summary: Detail Kategori
      tags:
      - Category
    put:
      consumes:
      - application/json
      description: Memperbaharui data kategori produk yang ada di dalam sistem
      parameters:
      - description: ID Kategori
        in: path
        name: id
        required: true
        type: string
      - description: Payload data kategori
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.CategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Kategori berhasil diperbaharui
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.SuccessResponse-github_com_faridlan_employee-tracker-api_internal_delivery_http_dto_CategoryResponse'
        "400":
          description: Format JSON salah atau validasi gagal
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
        "404":
          description: Kategori tidak ditemukan
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
      summary: Update Data Kategori
      tags:
      - Category
  /api/employees:
    get:
      description: Menampilkan semua data karyawan
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil mengambil detail karyawan
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.SuccessResponse-array_github_com_faridlan_employee-tracker-api_internal_delivery_http_dto_EmployeeResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
      summary: Data Karyawan
      tags:
      - Employee
    post:
      consumes:
      - application/json
      description: Mendaftarkan data karyawan baru ke dalam sistem
      parameters:
      - description: Payload data karyawan
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.EmployeeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Karyawan berhasil didaftarkan
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.SuccessResponse-github_com_faridlan_employee-tracker-api_internal_delivery_http_dto_EmployeeResponse'
        "400":
          description: Format JSON salah atau validasi gagal
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
        "500":
          description: Gagal menyimpan data karyawan
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
      summary: Registrasi Karyawan Baru
      tags:
      - Employee
  /api/employees/{employee_id}/performance:
    get:
      description: Melihat total target, total pencapaian, dan persentase performa
        karyawan pada bulan dan tahun tertentu
      parameters:
      - description: ID Karyawan
        in: path
        name: employee_id
        required: true
        type: string
      - description: Bulan (1-12)
        in: query
        name: month
        required: true
        type: integer
      - description: 'Tahun (Misal: 2026)'
        in: query
        name: year
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil menghitung performa
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.SuccessResponse-github_com_faridlan_employee-tracker-api_internal_delivery_http_dto_PerformanceResponse'
        "400":
          description: Parameter tidak valid
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
        "404":
          description: Karyawan tidak ditemukan
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse'
      summary: Kalkulasi Performa Karyawan
      tags:
      - Target
  /api/employees/{id}:
    get:
      description: Menampilkan detail informasi karyawan berdasarkan ID
      parameters:
      - description: ID Karyawan
        in: path
        name: id
        required: true
        type: string
      produces:

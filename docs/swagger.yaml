basePath: /
definitions:
  github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.AssignTargetRequest:
    properties:
      employee_id:
        example: uuid-employee
        type: string
      month:
        example: 5
        maximum: 12
        minimum: 1
        type: integer
      nominal:
        example: 500000000
        type: integer
      product_id:
        example: uuid-product
        type: string
      year:
        example: 2026
        minimum: 2000
        type: integer
    required:
    - employee_id
    - month
    - nominal
    - product_id
    - year
    type: object
  github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.CategoryResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      name_norm:
        type: string
      updated_at:
        type: string
    type: object
  github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.CreateCategoryRequest:
    properties:
      name:
        example: Kredit
        type: string
    required:
    - name
    type: object
  github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.CreateProductRequest:
    properties:
      category_id:
        example: uuid-kategori
        type: string
      name:
        example: KUR Bank
        type: string
    required:
    - category_id
    - name
    type: object
  github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.EmployeeResponse:
    properties:
      created_at:
        type: string
      entry_date:
        type: string
      id:
        type: string
      name:
        type: string
      office_location:
        type: string
      position:
        type: string
      updated_at:
        type: string
    type: object
  github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.ProductResponse:
    properties:
      category_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      name_norm:
        type: string
      updated_at:
        type: string
    type: object
  github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.ProductWithCategoryResponse:
    properties:
      category:
        $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.CategoryResponse'
      category_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      name_norm:
        type: string
      updated_at:
        type: string
    type: object
  github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.RecordAchievementRequest:
    properties:
      closing_date:
        example: "2026-05-10T14:00:00Z"
        type: string
      description:
        example: Pencairan KUR Nasabah A
        type: string
      nominal:
        example: 150000000
        type: integer
      target_id:
        example: uuid-target
        type: string
    required:
    - nominal
    - target_id
    type: object
  github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.RegisterEmployeeRequest:
    properties:
      entry_date:
        example: "2024-01-15T08:00:00Z"
        type: string
      name:
        example: Budi Santoso
        type: string
      office_location:
        example: Cabang Utama Jakarta
        type: string
      position:
        example: Sales Executive
        type: string
    required:
    - entry_date
    - name
    - office_location
    - position
    type: object
  github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.TargetResponse:
    properties:
      created_at:
        type: string
      employee_id:
        type: string
      id:
        type: string
      month:
        type: integer
      nominal:
        type: integer
      product_id:
        type: string
      updated_at:
        type: string
      year:
        type: integer
    type: object
  github_com_faridlan_employee-tracker-api_internal_utils.EmptyObj:
    type: object
  github_com_faridlan_employee-tracker-api_internal_utils.ErrorResponse:
    properties:
      detail:
        type: string
      error:
        example: pesan error
        type: string
    type: object
  ? github_com_faridlan_employee-tracker-api_internal_utils.SuccessResponse-array_github_com_faridlan_employee-tracker-api_internal_delivery_http_dto_CategoryResponse
  : properties:
      data:
        items:
          $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.CategoryResponse'
        type: array
      message:
        type: string
    type: object
  ? github_com_faridlan_employee-tracker-api_internal_utils.SuccessResponse-array_github_com_faridlan_employee-tracker-api_internal_delivery_http_dto_ProductWithCategoryResponse
  : properties:
      data:
        items:
          $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.ProductWithCategoryResponse'
        type: array
      message:
        type: string
    type: object
  ? github_com_faridlan_employee-tracker-api_internal_utils.SuccessResponse-github_com_faridlan_employee-tracker-api_internal_delivery_http_dto_CategoryResponse
  : properties:
      data:
        $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.CategoryResponse'
      message:
        type: string
    type: object
  ? github_com_faridlan_employee-tracker-api_internal_utils.SuccessResponse-github_com_faridlan_employee-tracker-api_internal_delivery_http_dto_EmployeeResponse
  : properties:
      data:
        $ref: '#/definitions/github_com_faridlan_employee-tracker-api_internal_delivery_http_dto.EmployeeResponse'
      message:
        type: string
    type: object
  ? github_com_faridlan_employee-tracker-api_internal_utils.SuccessResponse-github_com_faridlan_employee-tracker-api_internal_delivery_http_dto_ProductResponse

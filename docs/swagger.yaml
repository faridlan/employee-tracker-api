    put:
      consumes:
      - application/json
      description: Memperbaharui data karyawan yanga ada di dalam sistem
      parameters:
      - description: ID Karyawan
        in: path
        name: id
        required: true
        type: string
      - description: Payload data karyawan
        in: body
        name: request
        required: true
        schema:
